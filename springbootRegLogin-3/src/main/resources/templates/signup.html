<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="base :: layout(~{::section})">

	  <section>

	  <div class="auth-container">

	      <form action="/registerForm" method="post" class="auth-box">

	          <h2 class="text-center mb-3">Register</h2>
			  <p th:if="${msg}" th:text="${msg}" class="text-center text-success"></p>
			  
			  
			  
			  <input type="text" name="name" class="form-control mb-3" placeholder="Name">
	          <input type="email" name="email" placeholder="Email" class="form-control mb-2">
	          <input type="password" name="password" placeholder="Password" class="form-control mb-3">
			  <input type="text" name="Phone Number" class="form-control mb-3" placeholder="Phone Number">
			  <div class="form-check mb-3 text-start">
			          <input class="form-check-input" type="checkbox" id="terms" required>
			          <label class="form-check-label" for="terms">
			              I agree to Terms & Conditions
			          </label>
			      </div>
			  <div class="d-flex gap-2">
			          <button type="submit" class="btn btn-success w-50">Submit</button>
			          <button type="reset" class="btn btn-danger w-50">Reset</button>
			      </div>
	      </form>

	  </div>

	  </section>

</html>
