<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Profile</title>

  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/profile.css}">
</head>

<body>

<div class="container">

    <div class="profile-card shadow-lg text-center">

        <h2 class="profile-title">👤 My Profile</h2>

        
        <img th:src="@{'/images/' + ${session.currentUser.imageUrl}}" class="profile-img">

       
        <form action="/uploadPhoto" method="post" enctype="multipart/form-data" class="upload-form">
            <input type="file" name="image" class="form-control file-input">
            <button class="btn btn-primary upload-btn">Upload Photo</button>
        </form>

     
        <div class="profile-info">
            <p><strong>Name:</strong> <span th:text="${user.name}"></span></p>
            <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
        </div>

        
        <div class="profile-buttons">
            <a href="/add" class="btn btn-primary">➕ Add Content</a>
            <a href="/view" class="btn btn-success">📂 View Content</a>
           
			<a href="/view" class="btn btn-danger">🗑 Delete Content</a>

            <a href="/dashboard" class="btn btn-secondary">⬅ Back</a>
        </div>

    </div>

</div>

</body>
</html>
